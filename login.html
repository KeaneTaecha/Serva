<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Serva</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Jost:wght@300;400;500&family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-card">

    <div class="login-header">
      <a href="index.html" class="login-logo" aria-label="Back to Serva home">
        <img src="assets/images/logo.png" alt="Serva" />
      </a>
      <button class="login-lang-btn" id="loginLangBtn" aria-label="Toggle language">
        <span class="login-lang-opt" data-l="en">EN</span>
        <span class="login-lang-opt is-active" data-l="th">ไทย</span>
      </button>
    </div>

    <h1 id="authHeading" data-i18n="login.heading.signin">ยินดีต้อนรับกลับ</h1>
    <p class="login-sub" id="authSub" data-i18n="login.sub.signin">เข้าสู่ระบบบัญชีของคุณ</p>

    <form class="login-form" id="loginForm" novalidate>
      <div class="login-field">
        <label for="email" data-i18n="login.label.email">อีเมล</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="login-field">
        <label for="password" data-i18n="login.label.password">รหัสผ่าน</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div class="login-field" id="confirmPasswordField" style="display:none;">
        <label for="confirmPassword" data-i18n="login.label.confirm_password">ยืนยันรหัสผ่าน</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          autocomplete="new-password"
        />
      </div>

      <p class="login-error" id="loginError" role="alert"></p>
      <p class="login-success" id="loginSuccess" role="status"></p>

      <button type="submit" class="btn-login" id="btnEmailLogin" data-i18n="login.btn.signin">เข้าสู่ระบบ →</button>
    </form>

    <div class="login-divider"><span data-i18n="login.divider">หรือ</span></div>

    <button class="btn-google" id="btnGoogle" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
      </svg>
      <span data-i18n="login.google">ดำเนินการต่อด้วย Google</span>
    </button>

    <p class="login-toggle">
      <span id="toggleText" data-i18n="login.toggle.no_account">ยังไม่มีบัญชี?</span>
      <button type="button" class="login-toggle__btn" id="toggleModeBtn" data-i18n="login.toggle.create">สร้างบัญชี</button>
    </p>

    <a href="index.html" class="login-back" data-i18n="login.back">← กลับสู่ serva.services</a>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    initLoginPage();
  </script>
</body>
</html>
